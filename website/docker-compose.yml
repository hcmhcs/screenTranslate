services:
  screentranslate-web:
    image: screentranslate-web:latest
    container_name: screentranslate-web
    restart: unless-stopped
    networks:
      - filient_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  filient_net:
    external: true
